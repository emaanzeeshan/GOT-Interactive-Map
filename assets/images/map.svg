<svg viewBox="0 0 2400 1600" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
<defs>
  <radialGradient id="paper" cx="50%" cy="45%" r="75%">
    <stop offset="0%" stop-color="#efe2c0"/>
    <stop offset="55%" stop-color="#e6d4a8"/>
    <stop offset="100%" stop-color="#c9a968"/>
  </radialGradient>
  <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#3a2f1c"/>
    <stop offset="100%" stop-color="#2a2213"/>
  </linearGradient>
  <filter id="grain">
    <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" stitchTiles="stitch" result="n"/>
    <feColorMatrix in="n" type="matrix" values="0 0 0 0 0.25  0 0 0 0 0.18  0 0 0 0 0.08  0 0 0 0.10 0"/>
  </filter>
  <filter id="roughPaper">
    <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="4" result="t"/>
    <feColorMatrix in="t" type="matrix" values="0 0 0 0 0.55  0 0 0 0 0.42  0 0 0 0 0.20  0 0 0 0.18 0"/>
  </filter>
  <radialGradient id="vign" cx="50%" cy="45%" r="72%">
    <stop offset="55%" stop-color="#5a4420" stop-opacity="0"/>
    <stop offset="100%" stop-color="#3a2a10" stop-opacity="0.55"/>
  </radialGradient>
</defs>

<!-- ===== PARCHMENT BASE ===== -->
<rect x="0" y="0" width="2400" height="1600" fill="url(#paper)"/>
<rect x="0" y="0" width="2400" height="1600" filter="url(#roughPaper)"/>

<!-- outer double border -->
<rect x="30" y="30" width="2340" height="1540" fill="none" stroke="#2a2213" stroke-width="4"/>
<rect x="44" y="44" width="2312" height="1512" fill="none" stroke="#2a2213" stroke-width="1.5"/>

<!-- ===== TITLES ===== -->
<text x="760" y="400" font-size="80" letter-spacing="10" fill="#241a0c" font-weight="600">WESTEROS</text>
<text x="1720" y="640" font-size="72" letter-spacing="10" fill="#241a0c" font-weight="600">ESSOS</text>

<!-- ===== COMPASS ROSE ===== -->
<g transform="translate(2190,150)" stroke="#2a2213" fill="none" stroke-width="2">
  <circle r="62"/>
  <circle r="4" fill="#2a2213" stroke="none"/>
  <path d="M0,-62 L0,62 M-62,0 L62,0" stroke-width="1.4"/>
  <path d="M0,-62 L12,-30 L0,-40 L-12,-30 Z" fill="#2a2213" stroke="none"/>
  <path d="M0,62 L12,30 L0,40 L-12,30 Z" fill="#2a2213" stroke="none"/>
  <path d="M-62,0 L-30,12 L-40,0 L-30,-12 Z" fill="#2a2213" stroke="none"/>
  <path d="M62,0 L30,12 L40,0 L30,-12 Z" fill="#2a2213" stroke="none"/>
  <text x="0" y="-72" text-anchor="middle" font-size="22" fill="#2a2213" letter-spacing="2">N</text>
</g>

